services:
  - type: web
    name: myhostiq-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URL
        fromGroup: myhostiq-env
      - key: DB_NAME
        fromGroup: myhostiq-env
      - key: OPENAI_API_KEY
        fromGroup: myhostiq-env
      - key: MAPBOX_API_KEY
        fromGroup: myhostiq-env
      - key: JWT_SECRET
        fromGroup: myhostiq-env
      - key: ENCRYPTION_KEY
        fromGroup: myhostiq-env
      - key: FRONTEND_URL
        fromGroup: myhostiq-env
      - key: CORS_ORIGINS
        value: "*"
      - key: SENDGRID_API_KEY
        fromGroup: myhostiq-env
